<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Reviews</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  
}

/* SECTION */
.testimonial-section {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
 
}

/* HEADER */
.header1 h2 {
  font-size: 28px;
  font-weight: 700;
}

.header1 .stars {
  color: #f7c94a;
  font-size: 24px;
}

.header1 p {
  color: #666;
  font-size: 15px;
  margin-bottom: 25px;
}

/* SLIDER */
.reviews-container {
  overflow: hidden;
}

.reviews-grid {
  display: flex;
  gap: 40px;
  transition: transform 0.8s ease;
}

/* CARD */
.review-card {
  width: 250px;
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 5px 18px rgba(0,0,0,0.07);
  flex-shrink: 0;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 220px;
}

.review-stars {
  color: #f7c94a;
  font-size: 18px;
}

.review-text {
  font-size: 14px;
  color: #444;
  line-height: 1.5;
}

.review-name {
  font-weight: 600;
  font-size: 14px;
}

/* ARROWS */
.slider-nav {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.nav-btn {
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
}

.arrow {
  width: 45px;
  height: 45px;
  stroke: rgba(0,0,0,0.4);
  stroke-width: 2;
  fill: none;
  transition: 0.3s;
}

.nav-btn:hover .arrow {
  stroke: black;
  transform: scale(1.1);
}

/* ========================= */
/* 📱 RESPONSIVE */
/* ========================= */

@media (max-width: 1024px) {
  .testimonial-section {
    max-width: 800px;
  }
}

@media (max-width: 768px) {
  .testimonial-section {
    max-width: 600px;
  }
  .header1 h2 {
    font-size: 20px;
  }

  .header1 p {
    font-size: 13px;
  }

  .review-card {
    width: 220px;
    height: 200px;
    padding: 16px;
  }

  .review-text {
    font-size: 13px;
  }

  .arrow {
    width: 35px;
    height: 35px;
  }
}

@media (max-width: 480px) {
  .review-card {
    width: 85%;
  }

  .header1 h2 {
    font-size: 18px;
  }

  .header1 p {
    font-size: 12px;
  }
}

</style>
</head>

<body>
<div style="background-color: rgba(244, 248, 248, 0.514)">
<div class="testimonial-section">

  <div class="header1">
    <h2>What Our Customers Say</h2>
    <div class="stars">★★★★★</div>
    <p>Real experiences, honest feedback, and genuine trust in Royal Tag.</p>
  </div>

  <div class="reviews-container" id="reviewsContainer">
    <div class="reviews-grid" id="reviewsGrid"></div>
  </div>

  <div class="slider-nav">
    <button class="nav-btn" id="prevBtn1">
      <svg viewBox="6 0 12 24" class="arrow">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <button class="nav-btn" id="nextBtn1">
      <svg viewBox="6 0 12 24" class="arrow">
        <path d="M9 6l6 6-6 6"/>
      </svg>
    </button>
  </div>

</div>
</div>
<script>
const grid = document.getElementById('reviewsGrid');
const container = document.getElementById('reviewsContainer');
const prevBtn1 = document.getElementById('prevBtn1');
const nextBtn1 = document.getElementById('nextBtn1');

/* DATA */
const originalCards = `
<div class="review-card">
  <div class="review-stars">★★★★★</div>
  <div class="review-text">Great quality stuff! Worth buying.</div>
  <div class="review-name">Anonymous</div>
</div>

<div class="review-card">
  <div class="review-stars">★★★★★</div>
  <div class="review-text">Very elegant and comfortable</div>
  <div class="review-name">Tenveer Ahmed</div>
</div>

<div class="review-card">
  <div class="review-stars">★★★★★</div>
  <div class="review-text">Beautiful color and amazing comfort</div>
  <div class="review-name">Anonymous</div>
</div>

<div class="review-card">
  <div class="review-stars">★★★★★</div>
  <div class="review-text">Outstanding quality and service</div>
  <div class="review-name">Anonymous</div>
</div>
`;

grid.innerHTML = originalCards + originalCards;

/* 🔥 DYNAMIC WIDTH */
function getCardWidth() {
  const card = document.querySelector('.review-card');
  const gap = 20;
  return card.offsetWidth + gap;
}

let scrollPosition = 0;
let isTransitioning = false;
let autoSlideInterval;

/* AUTO SLIDE */
function startAutoSlide() {
  autoSlideInterval = setInterval(() => {
    if (!isTransitioning) moveNext();
  }, 3000);
}

/* NEXT */
function moveNext() {
  const cardWidth = getCardWidth();
  isTransitioning = true;
  scrollPosition += cardWidth;

  grid.style.transform = `translateX(-${scrollPosition}px)`;

  setTimeout(() => {
    if (scrollPosition >= (grid.scrollWidth / 2)) {
      grid.style.transition = 'none';
      scrollPosition = 0;
      grid.style.transform = `translateX(0)`;
    }
    grid.style.transition = 'transform 0.8s ease';
    isTransitioning = false;
  }, 800);
}

/* PREV */
function movePrev() {
  const cardWidth = getCardWidth();
  isTransitioning = true;
  scrollPosition -= cardWidth;

  grid.style.transform = `translateX(-${scrollPosition}px)`;

  setTimeout(() => {
    if (scrollPosition < 0) {
      scrollPosition = (grid.scrollWidth / 2) - cardWidth;
      grid.style.transform = `translateX(-${scrollPosition}px)`;
    }
    isTransitioning = false;
  }, 800);
}

/* BUTTONS */
nextBtn1.onclick = () => {
  clearInterval(autoSlideInterval);
  moveNext();
  startAutoSlide();
};

prevBtn1.onclick = () => {
  clearInterval(autoSlideInterval);
  movePrev();
  startAutoSlide();
};

/* HOVER PAUSE */
container.onmouseenter = () => clearInterval(autoSlideInterval);
container.onmouseleave = startAutoSlide;

/* RESIZE FIX */
window.addEventListener('resize', () => {
  scrollPosition = 0;
  grid.style.transform = `translateX(0)`;
});

/* START */
startAutoSlide();
</script>

</body>
</html>
